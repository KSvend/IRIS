name: MERLx IRIS Monitor

on:
  workflow_dispatch:
    inputs:
      run_sweeps:
        description: 'Run Apify sweeps (costs ~$1.75)'
        type: boolean
        default: true
      run_reach:
        description: 'Run reach tracking (costs ~$0.25)'
        type: boolean
        default: true
      run_ml:
        description: 'Run ML classification + explanations'
        type: boolean
        default: true

  # Run once daily at 08:30 UTC — safely after Google AI Studio's
  # midnight-Pacific quota reset under both PST (08:00 UTC) and PDT (07:00 UTC),
  # so explain_posts/review_events get a fresh free-tier window.
  schedule:
    - cron: '30 8 * * *'

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install requests transformers scipy numpy python-dotenv

      - name: Run monitoring pipeline
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # LLM providers — tried in order until one succeeds.
          # Primary: Gemini 2.5 Flash (free tier, midnight-PT daily reset).
          # Fallback: Groq Llama-3.3-70B (free tier, separate quota).
          # Last resort: Anthropic (paid; leave secret unset to disable).
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FB_COOKIES: ${{ secrets.FB_COOKIES }}
          RUN_SWEEPS: ${{ github.event.inputs.run_sweeps || 'true' }}
          RUN_REACH: ${{ github.event.inputs.run_reach || 'true' }}
          RUN_ML: ${{ github.event.inputs.run_ml || 'true' }}
        run: python monitoring/run_pipeline.py

      - name: Commit and push data
        run: |
          git config user.name "MERLx IRIS Bot"
          git config user.email "krdasv@me.com"

          git add docs/data/ monitoring/autolearn/ monitoring/config/ data/ || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            EVENT_COUNT=$(python3 -c "import json; d=json.load(open('docs/data/events.json')); print(len(d))")
            HS_COUNT=$(python3 -c "import json; d=json.load(open('docs/data/hate_speech_posts.json')); print(len(d))")

            git commit -m "Auto-update: ${EVENT_COUNT} events, ${HS_COUNT} HS posts — ${TIMESTAMP}"
            git stash --include-untracked || true
            git fetch origin main
            git rebase origin/main || git rebase --abort
            git stash pop || true
            git push
          fi
